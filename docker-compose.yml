version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: founder_pad_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/founder_pad_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-$(mix phx.gen.secret)}
      PHX_HOST: localhost
      PORT: 4000
    ports:
      - "4000:4000"

volumes:
  pgdata:
